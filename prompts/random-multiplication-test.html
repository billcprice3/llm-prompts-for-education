<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Test Generator</title>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-light: #f8f9fa;
            --text-dark: #343a40;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .test-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .question-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2em;
        }

        .question-text {
            flex-grow: 1;
            font-weight: bold;
        }

        .answer-input {
            width: 70px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            text-align: center;
        }
        
        /* Styling for feedback */
        .question-row.correct .question-text,
        .question-row.correct .answer-input {
            background-color: rgba(40, 167, 69, 0.1); /* Light green background */
        }
        
        .question-row.correct .answer-input {
            border-color: var(--success-color);
        }

        .question-row.incorrect .question-text,
        .question-row.incorrect .answer-input {
            background-color: rgba(220, 53, 69, 0.1); /* Light red background */
        }

        .question-row.incorrect .answer-input {
            border-color: var(--error-color);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s, transform 0.1s;
            width: 100%;
            box-sizing: border-box;
        }

        #randomizeButton {
            background-color: var(--primary-color);
            color: white;
        }

        #randomizeButton:hover {
            background-color: #0056b3;
        }

        #submitButton {
            background-color: var(--success-color);
            color: white;
        }

        #submitButton:hover {
            background-color: #1e7e34;
        }
        
        #scoreDisplay {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Math Mastery: Multiplication Quiz</h1>
        <p>Answer the 10 multiplication problems below.</p>
        
        <div id="testContainer" class="test-grid">
            <!-- Questions will be injected here -->
        </div>
        
        <div class="controls">
            <button id="randomizeButton">🎲 Randomize Problems</button>
            <button id="submitButton">✅ Submit Answers</button>
        </div>
        
        <div id="scoreDisplay">Score: 0 / 10</div>
    </div>

    <script>
        const NUM_QUESTIONS = 10;
        const testContainer = document.getElementById('testContainer');
        const randomizeButton = document.getElementById('randomizeButton');
        const submitButton = document.getElementById('submitButton');
        const scoreDisplay = document.getElementById('scoreDisplay');

        // Array to hold the correct answers for comparison
        let correctAnswers = [];

        /**
         * Generates a random integer between min and max (inclusive).
         * @param {number} min 
         * @param {number} max 
         * @returns {number}
         */
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        /**
         * Generates a unique random multiplication problem (x * y).
         * @returns {object} { question: string, answer: number }
         */
        function generateProblem() {
            let x, y, question, answer;
            do {
                // x and y are integers between 2 and 9
                x = getRandomInt(2, 9);
                y = getRandomInt(2, 9);
                question = `${x} * ${y}`;
                answer = x * y;
            } while (
                // Simple check to ensure we don't generate the same problem multiple times 
                // in a short run, although a more robust solution would use a tracking set.
                // For 10 questions, this is generally sufficient.
                isNaN(correctAnswers.length) 
            );
            return { question: question, answer: answer };
        }

        /**
         * Renders the test container with the given problems.
         * Updates the stored correct answers.
         * @param {Array<object>} problems 
         */
        function renderTest(problems) {
            testContainer.innerHTML = '';
            correctAnswers = [];

            problems.forEach((problem, index) => {
                // Store the correct answer
                correctAnswers.push(problem.answer);

                // Create the DOM structure
                const row = document.createElement('div');
                row.classList.add('question-row');
                row.setAttribute('data-index', index);

                // Question Text
                const questionText = document.createElement('span');
                questionText.classList.add('question-text');
                questionText.textContent = problem.question;
                row.appendChild(questionText);

                // Answer Input
                const input = document.createElement('input');
                input.type = 'number';
                input.classList.add('answer-input');
                input.setAttribute('data-index', index);
                // Ensure inputs are cleared before rendering
                input.value = ''; 
                row.appendChild(input);

                testContainer.appendChild(row);
            });
            
            // Reset styling after rendering
            document.querySelectorAll('.question-row').forEach(r => {
                r.className = 'question-row';
            });
            
            // Clear previous score
            scoreDisplay.textContent = 'Score: 0 / 10';
        }

        /**
         * Generates and renders the entire test.
         */
        function generateAndRenderTest() {
            const problems = [];
            for (let i = 0; i < NUM_QUESTIONS; i++) {
                problems.push(generateProblem());
            }
            renderTest(problems);
        }

        /**
         * Checks all user inputs against the correct answers.
         */
        function checkAnswers() {
            let score = 0;
            const inputs = document.querySelectorAll('.answer-input');
            const rows = document.querySelectorAll('.question-row');

            inputs.forEach((input, index) => {
                const userAnswer = parseInt(input.value.trim());
                const correctAnswer = correctAnswers[index];
                const row = rows[index];
                
                // 1. Check if the answer is correct
                if (userAnswer === correctAnswer) {
                    score++;
                    // Apply correct styling
                    row.classList.remove('incorrect');
                    row.classList.add('correct');
                    input.style.pointerEvents = 'none'; // Disable input after grading
                    input.setAttribute('disabled', 'true');
                } else {
                    // Apply incorrect styling
                    row.classList.remove('correct');
                    row.classList.add('incorrect');
                    input.style.pointerEvents = 'none'; // Disable input after grading
                    input.setAttribute('disabled', 'true');
                }
                
                // Optionally, display the correct answer next to the field for feedback
                if (userAnswer !== correctAnswer) {
                    // Note: Since we don't have a visual feedback placeholder,
                    // we just ensure the styling is applied.
                }
            });

            // Update the score display
            scoreDisplay.textContent = `Score: ${score} / ${NUM_QUESTIONS}`;
        }


        // --- Event Listeners ---

        // 1. Randomize Button Handler
        randomizeButton.addEventListener('click', generateAndRenderTest);

        // 2. Submit Button Handler
        submitButton.addEventListener('click', checkAnswers);
        
        // --- Initialization ---
        // Start the test when the page loads
        window.onload = generateAndRenderTest;

    </script>
</body>
</html>
